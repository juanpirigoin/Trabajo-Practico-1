      <form action="">
        <div class="formulario caveat-brush-regular">
          <label for="nombre">Nombre</label>
          <input type="text" name="nombre" id="nombre" placeholder="Juan Perez" required/>
          <label for="email">Email</label>
          <input type="email" name="email" id="email" placeholder="juanperz@mail.com" required/>
          <label for="asunto">Asunto</label>
          <input type="text" name="asunto" id="asunto" required/>
          <label for="mensaje">Mensaje</label>
          <textarea name="mensaje" id="mensaje" rows="8" cols="40" required></textarea>
          <button type="submit" class="caveat-brush-regular">Enviar</button>
        </div>
      </form>
