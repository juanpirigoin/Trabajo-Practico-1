<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aislados el podcast</title>
    <link rel="stylesheet" href="..\css\style-general.css" />
    <script
      src="https://kit.fontawesome.com/ef88cf4afb.js"
      crossorigin="anonymous"
    ></script>
  </head>
  <body>
    <header>
      <nav>
        <ul class="caveat-brush-regular">
          <li><a href="../index.html">Inicio</a></li>
          <li><a href="entradas.html">Entradas</a></li>
          <li><a href="episodios.html">Episodios</a></li>
          <li><a href="nosotros.html">Nosotros</a></li>
          <li><a href="contacto.html">Contacto</a></li>
        </ul>
        <div class="iconos">
          <a
            href="https://open.spotify.com/show/5LdAXU1UaaGK2PD6yOXxMR?si=804124c8c71548db"
            target="_blank"
            ><i class="fa-brands fa-spotify"></i
          ></a>
          <a href="https://www.youtube.com/@AisladosElPodcast" target="_blank"
            ><i class="fa-brands fa-youtube"></i
          ></a>
          <a href="https://www.instagram.com/aisladoselpodcast/" target="_blank"
            ><i class="fa-brands fa-instagram"></i
          ></a>
          <!-- <div class="login">
            <a href="" class="caveat-brush-regular">Ingresar</a>
          </div> -->
        </div>
      </nav>
    </header>
    <main>
      <img
        id="banner2"
        src="../imagenes/aislados-el-podcast.jpeg"
        alt="banner-aislados"
      />
      <img
        id="banner"
        src="..\imagenes\asilados banner.jpg"
        alt="banner-aislados"
      />
      <h1 class="caveat-brush-regular">CONTACTANOS</h1>
      <form action="">
        <div class="formulario caveat-brush-regular">
          <label for="nombre">Nombre</label>
          <input
            type="text"
            name="nombre"
            id="nombre"
            placeholder="Juan Perez"
            required
          />
          <label for="email">Email</label>
          <input
            type="email"
            name="email"
            id="email"
            placeholder="juanperz@mail.com"
            required
          />
          <label for="telefono">Teléfono</label>
          <input
            type="tel"
            name="telefono"
            id="telefono"
            placeholder="02233242355"
            required
          />
          <label for="asunto">Asunto</label>
          <input type="text" name="asunto" id="asunto" required />
          <label for="mensaje">Mensaje</label>
          <textarea
            name="mensaje"
            id="mensaje"
            rows="8"
            cols="40"
            placeholder="Ingresa tu mensaje"
            required
          ></textarea>
          <label>Contanos más acerca de vos:</label>
          <div>
            <div>
              <input type="checkbox" name="informacion1" id="informacion1" />
            <label for="informacion1">Escuchas el podcast</label>
            </div>
            <div>
              <input type="checkbox" name="informacion2" id="informacion2" />
            <label for="informacion2">Nos viste en vivo</label>
            </div>
            <div>
              <input type="checkbox" name="informacion3" id="informacion3" />
            <label for="informacion3">Nos seguís en nuestras redes</label>
            </div>
          </div>
          <div class="botones">
            <button type="submit" class="caveat-brush-regular">Enviar</button>
            <button type="reset" class="caveat-brush-regular">Borrar</button>
          </div>
        </div>
      </form>
    </main>
    <footer>
      <div>
        <div>
          <img src="../imagenes/logo.jpg" alt="logo" />
        </div>
        <div class="iconos-y-derechos">
          <div class="iconos">
            <a
              href="https://open.spotify.com/show/5LdAXU1UaaGK2PD6yOXxMR?si=804124c8c71548db"
              target="_blank"
              ><i class="fa-brands fa-spotify"></i
            ></a>
            <a href="https://www.youtube.com/@AisladosElPodcast" target="_blank"
              ><i class="fa-brands fa-youtube"></i
            ></a>
            <a
              href="https://www.instagram.com/aisladoselpodcast/"
              target="_blank"
              ><i class="fa-brands fa-instagram"></i
            ></a>
          </div>
          <div class="derechos">
            <p class="caveat-brush-regular">
              © 2026 Aislados El Podcast. Todos los derechos reservados.
            </p>
          </div>
        </div>
      </div>
    </footer>
  </body>
</html>
